        # List of file patterns to exclude from analysis.
        # Values always ignored: `.+_test.go`.
        # Default: []
        # ignored-files:
        #   - 'magic1_.+\.go$'

        # List of function patterns to exclude from analysis.
        # Following functions are always ignored: `time.Date`,
        # `strconv.FormatInt`, `strconv.FormatUint`, `strconv.FormatFloat`,
        # `strconv.ParseInt`, `strconv.ParseUint`, `strconv.ParseFloat`.
        # Default: []
        # ignored-functions:
        #   - '^math\.'
        #   - '^http\.StatusText$'
      # @config-manager:end linters-settings-mnd

    modernize:
      # @config-manager:start linters-settings-modernize
      # List of analyzers to disable.
      # By default, all analyzers are enabled.
      disable: []
      # @config-manager:end linters-settings-modernize

    nakedret:
      # @config-manager:start linters-settings-nakedret
      # Make an issue if func has more lines of code than this setting, and it
      # has naked returns.
      # Default: 30
      max-func-lines: 30
      # @config-manager:end linters-settings-nakedret

    nestif:
      # @config-manager:start linters-settings-nestif
      # Minimal complexity of if statements to report.
      # Default: 5
      min-complexity: 10
      # @config-manager:end linters-settings-nestif

    nilnil:
      # @config-manager:start linters-settings-nilnil
      # To check functions with only two return values (`return nil, nil`).
      # If disabled then returns like `return nil, nil, ..., nil` are supported.
      # Default: true
      only-two: false

      # In addition, detect opposite situation (simultaneous return of non-nil error and valid value).
      # E.g, `return clone, fh.indexer.Update(clone)` will be considered as invalid.
      # Default: false
      detect-opposite: false

      # List of return types to check.
      # Default: ["chan", "func", "iface", "map", "ptr", "uintptr", "unsafeptr"]
      checked-types:
        - chan
        - func
        - iface
        - map
        - ptr
        - uintptr
        - unsafeptr
        # @config-manager:end linters-settings-nilnil

    nlreturn:
      # @config-manager:start linters-settings-nlreturn
      # Size of the block (including return statement that is still "OK"),
      # so no return split required.
      # Default: 1
      block-size: 2
      # @config-manager:end linters-settings-nlreturn

    nolintlint:
      # @config-manager:start linters-settings-nolintlint
      # Disable to ensure that all nolint directives actually have an effect.
      # Default: false
      allow-unused: false

      # Exclude following linters from requiring an explanation.
      # Default: []
      allow-no-explanation: []

      # Enable to require an explanation of nonzero length after each nolint directive.
      # Default: false
      require-explanation: true

      # Enable to require nolint directives to mention the specific linter being suppressed.
      # Default: false
      require-specific: true
      # @config-manager:end linters-settings-nolintlint

    nonamedreturns:
      # @config-manager:start linters-settings-nonamedreturns
      # Report named error if it is assigned inside defer.
      # Default: false
      report-error-in-defer: false
      # @config-manager:end linters-settings-nonamedreturns

    paralleltest:
      # @config-manager:start linters-settings-paralleltest
      # Ignore missing calls to `t.Parallel()` and only report incorrect uses of it.
      # Default: false
      ignore-missing: true

      # Ignore missing calls to `t.Parallel()` in subtests. Top-level tests are
      # still required to have `t.Parallel`, but subtests are allowed to skip it.
      # Default: false
      ignore-missing-subtests: true
      # @config-manager:end linters-settings-paralleltest

    perfsprint:
      # @config-manager:start linters-settings-perfsprint
      # Enable/disable optimization of integer formatting.
      # Default: true
      integer-format: true

      # Optimizes even if it requires an int or uint type cast.
      # Default: true
      int-conversion: true

      # Enable/disable optimization of error formatting.
      # Default: true
      error-format: true

      # Optimizes into `err.Error()` even if it is only equivalent for non-nil errors.
      # Default: false
      err-error: false

      # Optimizes `fmt.Errorf`.
      # Default: true
      errorf: true

      # Enable/disable optimization of string formatting.
      # Default: true
      string-format: true

      # Optimizes `fmt.Sprintf` with only one argument.
      # Default: true
      sprintf1: true

      # Optimizes into strings concatenation.
      # Default: true
      strconcat: true

      # Enable/disable optimization of bool formatting.
      # Default: true
      bool-format: true

      # Enable/disable optimization of hex formatting.
      # Default: true
      hex-format: true
      # @config-manager:end linters-settings-perfsprint

    # prealloc:
    #   # IMPORTANT: we don't recommend using this linter before doing performance profiling.
    #   # For most programs usage of prealloc will be a premature optimization.

    #   # Report pre-allocation suggestions only on simple loops that have no returns/breaks/continues/gotos in them.
    #   # Default: true
    #   simple: false
    #   # Report pre-allocation suggestions on range loops.
    #   # Default: true
    #   range-loops: false
    #   # Report pre-allocation suggestions on for loops.
    #   # Default: false
    #   for-loops: true

