---
# https://github.com/golangci/golangci-lint/blob/master/.golangci.reference.yml
# https://golangci-lint.run/jsonschema/golangci.jsonschema.json

# Defines the configuration version.
# The only possible value is "2".
version: "2"

linters:
  default: none

  # Enable specific linters.
  enable:
    # @config-manager:start linters-enable
    - arangolint
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - clickhouselint
    - containedctx
    - contextcheck
    - copyloopvar
    # - cyclop
    - decorder
    - depguard
    - dogsled
    - dupl
    - dupword
    - durationcheck
    - embeddedstructfieldcheck
    - err113
    - errcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    # - exhaustruct
    - exptostd
    - fatcontext
    # - forbidigo
    - forcetypeassert
    - funcorder
    - funlen
    # - ginkgolinter
    - gocheckcompilerdirectives
    # - gochecknoglobals
    - gochecknoinits
    - gochecksumtype
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godoclint
    - godot
    - godox
    - goheader
    # - gomoddirectives
    # - gomodguard_v2
    - goprintffuncname
    - gosec
    # - gosmopolitan
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - interfacebloat
    - intrange
    - iotamixing
    # - ireturn
    - lll
    # - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - mnd
    - modernize
    # - musttag
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - nilnil
    - nlreturn
    - noctx
    # - noinlineerr
    - nolintlint
    - nonamedreturns
    - nosprintfhostport
    - paralleltest
    - perfsprint
    # - prealloc
    # - predeclared
    # - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    # - rowserrcheck
    - sloglint
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagalign
    - tagliatelle
    - testableexamples
    - testifylint
    # - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    # - unqueryvet
    - unused
    - usestdlibvars
    - usetesting
    # - varnamelen
    - wastedassign
    - whitespace
    - wrapcheck
    - wsl_v5
    - zerologlint
    # @config-manager:end linters-enable

    # All available settings of specific linters.
  settings:
    asasalint:
      # @config-manager:start linters-settings-asasalint
      # To specify a set of function names to exclude.
      # The values are merged with the builtin exclusions.
      # The builtin exclusions can be disabled by setting `use-builtin-exclusions` to `false`.
      # Default: ["^(fmt|log|logger|t|)\.(Print|Fprint|Sprint|Fatal|Panic|Error|Warn|Warning|Info|Debug|Log)(|f|ln)$"]
      # exclude:
      #   - "^(fmt|log|logger|t)\.(Print|Fprint|Sprint|Fatal|Panic|Error|Warn|Warning|Info|Debug|Log)(f|ln)$"

      # To enable/disable the asasalint builtin exclusions of function names.
      # See the default value of `exclude` to get the builtin exclusions.
      # Default: true
      use-builtin-exclusions: true
      # @config-manager:end linters-settings-asasalint

    bidichk:
      # @config-manager:start linters-settings-bidichk
      # The following configurations check for all mentioned invisible Unicode runes.
      # All runes are enabled by default.
      first-strong-isolate: true
      left-to-right-embedding: true
      left-to-right-isolate: true
      left-to-right-override: true
      pop-directional-formatting: true
      pop-directional-isolate: true
      right-to-left-embedding: true
      right-to-left-isolate: true
      right-to-left-override: true
      # @config-manager:end linters-settings-bidichk

    bodyclose:
      # @config-manager:start linters-settings-bodyclose
      # Check that the response body is consumed. This has false positives.
      # Default: false
      check-consumption: false
      # @config-manager:end linters-settings-bodyclose

    copyloopvar:
      # @config-manager:start linters-settings-copyloopvar
      # Check all assigning the loop variable to another variable.
      # Default: false
      check-alias: true
      # @config-manager:end linters-settings-copyloopvar

    decorder:
      # @config-manager:start linters-settings-decorder
      # Required order of `type`, `const`, `var` and `func` declarations inside a file.
      # Default: types before constants before variables before functions.
      dec-order:
        - const
        - var
        - type
        - func

      # If true, underscore vars (vars with "_" as the name) will be ignored at all checks.
      # Default: false (underscore vars are not ignored)
      ignore-underscore-vars: false

      # If true, order of declarations is not checked at all.
      # Default: true (disabled)
      disable-dec-order-check: false

      # If true, `init` func can be anywhere in file (does not have to be declared before all other functions).
      # Default: true (disabled)
      disable-init-func-first-check: false

      # If true, multiple global `type`, `const` and `var` declarations are allowed.
      # Default: true (disabled)
      disable-dec-num-check: false

      # If true, type declarations will be ignored for dec num check.
      # Default: false (type statements are not ignored)
      disable-type-dec-num-check: false

      # If true, const declarations will be ignored for dec num check.
      # Default: false (const statements are not ignored)
      disable-const-dec-num-check: false

      # If true, var declarations will be ignored for dec num check.
      # Default: false (var statements are not ignored)
      disable-var-dec-num-check: false
      # @config-manager:end linters-settings-decorder

    depguard:
      # - File Variables
      #   Use an exclamation mark `!` to negate a variable.
      #   Example: `!$test` matches any file that is not a go test file.
      #
      #   `$all` - matches all go files
      #   `$test` - matches all go test files
      #
      # - Package Variables
      #
      #   `$gostd` - matches all of go's standard library (Pulled from `GOROOT`)
      rules:
        main:
          # @config-manager:start linters-settings-depguard
          # - `original`: allowed if it doesn't match the deny list and either matches the allow list or the allow list is empty.
          # - `strict`: allowed only if it matches the allow list and either doesn't match the deny list or the allow rule is more specific (longer) than the deny rule.
          # - `lax`: allowed if it doesn't match the deny list or the allow rule is more specific (longer) than the deny rule.
          #
          # Default: "original"
          list-mode: lax

          # List of file globs that will match this list of settings to compare against.
          # By default, if a path is relative, it is relative to the directory where the golangci-lint command is executed.
          # The placeholder '${base-path}' is substituted with a path relative to the mode defined with `run.relative-path-mode`.
          # The placeholder '${config-path}' is substituted with a path relative to the configuration file.
          # Default: $all
          files:
            - $all

          # List of allowed packages.
          # Entries can be a variable (starting with $), a string prefix, or an exact match (if ending with $).
          # Default: []
          allow:
            - $gostd
            - ariga.io/atlas
            - ariga.io/entcache
            - charm.land/
            - cloud.google.com/go/
            - dario.cat/mergo
            - entgo.io/contrib
            - entgo.io/ent
            - github.com/99designs/gqlgen
            - github.com/alecthomas/chroma
            - github.com/alitto/pond
            - github.com/aws/aws-lambda-go
            - github.com/aws/aws-sdk-go-v2/
            - github.com/aymanbagabas/go-nativeclipboard
            - github.com/Azure/azure-sdk-for-go
            - github.com/AzureAD/microsoft-authentication-library-for-go
            - github.com/chanced/caps
            - github.com/davecgh/go-spew
            - github.com/ebitengine/purego
            - github.com/gin-contrib/
            - github.com/gin-gonic/
            - github.com/go-enry/go-enry
            - github.com/google/go-cmp
            - github.com/google/go-github
            - github.com/grpc-ecosystem/
            - github.com/gruntwork-io/terratest
            - github.com/gtramontina/ooze
            - github.com/hairyhenderson/go-which
            - github.com/hashicorp/errwrap
            - github.com/hashicorp/go-version
            - github.com/hashicorp/hcl/v2
            - github.com/hashicorp/terraform-plugin-docs
            - github.com/hashicorp/terraform-plugin-framework
            - github.com/hashicorp/terraform-plugin-go
            - github.com/hashicorp/terraform-plugin-log
            - github.com/lib/pq
            - github.com/lithammer/dedent
            - github.com/microcosm-cc/bluemonday
            - github.com/natefinch/atomic
            - github.com/nlnwa/whatwg-url
            - github.com/oklog/ulid
            - github.com/owenrumney/go-sarif
            - github.com/pelletier/go-toml/v2
            - github.com/pkg/browser
            - github.com/ProtonMail/go-crypto
            - github.com/rs/zerolog
            - github.com/spf13/cobra
            - github.com/spf13/viper
            - github.com/stretchr/testify
            - github.com/teekennedy/goldmark-markdown
            - github.com/valkey-io/valkey-go
            - github.com/valkey-io/valkey-go/valkeycompat
            - github.com/yuin/goldmark
            - github.com/yuin/goldmark-emoji
            - github.com/zclconf/go-cty
            - go.nwlabs.dev
            - go.opentelemetry.io
            - go.uber.org/mock
            - go.uber.org/multierr
            - go.yaml.in/yaml/v4
            - golang.org
            - google.golang.org
            - k8s.io
            - pgregory.net/rapid
            - sigs.k8s.io

          # List of packages that are not allowed.
          # Entries can be a variable (starting with $), a string prefix, or an exact match (if ending with $).
          # Default: []
          deny:
            - pkg: "math/rand$"
              desc: use math/rand/v2

            - pkg: "github.com/aws/aws-sdk-go/"
              desc: Use github.com/aws/aws-sdk-go-v2 instead.

            - pkg: "github.com/BurntSushi/toml"
              desc: Use github.com/pelletier/go-toml/v2 instead.

            - pkg: "github.com/charmbracelet/"
              desc: Use charm.land v2 libraries instead.

            - pkg: "github.com/go-errors/errors"
              desc: Use standard library errors packages instead.

            - pkg: "github.com/golang/glog"
              desc: Use charm.land/log/v2 (with log/slog) for CLIs or github.com/rs/zerolog for servers instead.

            - pkg: "github.com/gookit/color"
              desc: Use go.nwlabs.dev/cli-helpers/v2 (standard colors) OR charm.land/lipgloss/v2.

            - pkg: "github.com/hashicorp/go-multierror"
              desc: Use go.uber.org/multierr instead.

            - pkg: "github.com/imdario/mergo"
              desc: Use dario.cat/mergo instead.

            # - pkg: "github.com/northwood-labs/"
            #   desc: Use go.nwlabs.dev import paths instead.

            - pkg: "github.com/panjf2000/ants"
              desc: Use github.com/alitto/pond instead.

            - pkg: "github.com/pkg/errors"
              desc: Use standard library errors packages instead.

            - pkg: "github.com/russross/blackfriday"
              desc: Use github.com/yuin/goldmark instead.

            - pkg: "github.com/Sirupsen/logrus"
              desc: Use charm.land/log/v2 (with log/slog) for CLIs or github.com/rs/zerolog for servers instead.

            - pkg: "github.com/sirupsen/logrus"
              desc: Use charm.land/log/v2 (with log/slog) for CLIs or github.com/rs/zerolog for servers instead.

            - pkg: "go.uber.org/zap"
              desc: Use charm.land/log/v2 (with log/slog) for CLIs or github.com/rs/zerolog for servers instead.

            - pkg: "go.yaml.in/yaml/v2"
              desc: Use v4 instead.

            - pkg: "go.yaml.in/yaml/v3"
              desc: Use v4 instead.
              # @config-manager:end linters-settings-depguard

    dogsled:
      # @config-manager:start linters-settings-dogsled
      # Checks assignments with too many blank identifiers.
      # Default: 2
      max-blank-identifiers: 2
      # @config-manager:end linters-settings-dogsled

    dupl:
      # @config-manager:start linters-settings-dupl
      # Tokens count to trigger issue.
      # Default: 150
      threshold: 150
      # @config-manager:end linters-settings-dupl

    dupword:
      # @config-manager:start linters-settings-dupword
      # Keywords for detecting duplicate words.
      # If this list is not empty, only the words defined in this list will be detected.
      # Default: []
      keywords:
        - a
        - an
        - and
        - of
        - or
        - the
        - this
        # Keywords used to ignore detection.
        # Default: []
        # ignore:
        #   - "0C0C"
      # @config-manager:end linters-settings-dupword

    embeddedstructfieldcheck:
      # @config-manager:start linters-settings-embeddedstructfieldcheck
      # Checks that sync.Mutex and sync.RWMutex are not used as embedded fields.
      # Default: false
      forbid-mutex: true
      # @config-manager:end linters-settings-embeddedstructfieldcheck

    errcheck:
      # @config-manager:start linters-settings-errcheck
      # Report about not checking of errors in type assertions: `a := b.(MyStruct)`.
      # Such cases aren't reported by default.
      # Default: false
      check-type-assertions: true

      # report about assignment of errors to blank identifier: `num, _ := strconv.Atoi(numStr)`.
      # Such cases aren't reported by default.
      # Default: false
      check-blank: false

      # To disable the errcheck built-in exclude list.
      # See `-excludeonly` option in https://github.com/kisielk/errcheck#excluding-functions for details.
      # Default: false
      disable-default-exclusions: false

      # List of functions to exclude from checking, where each entry is a single function to exclude.
      # See https://github.com/kisielk/errcheck#excluding-functions for details.
      exclude-functions:
        - io/ioutil.ReadFile
        - io.Copy(*bytes.Buffer)
        - io.Copy(os.Stdout)
        - (*os.File).Close

      # Display function signature instead of selector.
      # Default: false
      verbose: true
      # @config-manager:end linters-settings-errcheck

    errchkjson:
      # @config-manager:start linters-settings-errchkjson
      # With check-error-free-encoding set to true, errchkjson does warn about errors
      # from json encoding functions that are safe to be ignored,
      # because they are not possible to happen.
      #
      # if check-error-free-encoding is set to true and errcheck linter is enabled,
      # it is recommended to add the following exceptions to prevent from false positives:
      #
      #     linters:
      #       settings:
      #         errcheck:
      #           exclude-functions:
      #             - encoding/json.Marshal
      #             - encoding/json.MarshalIndent
      #
      # Default: false
      check-error-free-encoding: false

      # Issue on struct encoding that doesn't have exported fields.
      # Default: false
      report-no-exported: false
      # @config-manager:end linters-settings-errchkjson

    errorlint:
      # @config-manager:start linters-settings-errorlint
      # Check whether fmt.Errorf uses the %w verb for formatting errors.
      # See the https://github.com/polyfloyd/go-errorlint for caveats.
      # Default: true
      errorf: true

      # Permit more than 1 %w verb, valid per Go 1.20 (requires `errorf: true`).
      # Default: true
      errorf-multi: true

      # Check for plain type assertions and type switches.
      # Default: true
      asserts: true

      # Check for plain error comparisons.
      # Default: true
      comparison: true
      # Allowed errors.
      # Default: []
      # allowed-errors:
      #   - err: "io.EOF"
      #     fun: "example.com/pkg.Read"

      # Allowed error "wildcards".
      # Default: []
      # allowed-errors-wildcard:
      #   - err: "example.com/pkg.ErrMagic"
      #     fun: "example.com/pkg.Magic"
      # @config-manager:end linters-settings-errorlint

    exhaustive:
      # @config-manager:start linters-settings-exhaustive
      # Program elements to check for exhaustiveness.
      # Default: [ switch ]
      check:
        - switch
        - map

      # Presence of "default" case in switch statements satisfies exhaustiveness,
      # even if all enum members are not listed.
      # Default: false
      default-signifies-exhaustive: true

      # Enum members matching the supplied regex do not have to be listed in
      # switch statements to satisfy exhaustiveness.
      # Default: ""
      ignore-enum-members: "Example.+"

      # Enum types matching the supplied regex do not have to be listed in
      # switch statements to satisfy exhaustiveness.
      # Default: ""
      ignore-enum-types: "Example.+"

      # Consider enums only in package scopes, not in inner scopes.
      # Default: false
      package-scope-only: false

      # Only run exhaustive check on switches with "//exhaustive:enforce" comment.
      # Default: false
      explicit-exhaustive-switch: false

      # Only run exhaustive check on map literals with "//exhaustive:enforce" comment.
      # Default: false
      explicit-exhaustive-map: false

      # Switch statement requires default case even if exhaustive.
      # Default: false
      default-case-required: true
      # @config-manager:end linters-settings-exhaustive

    fatcontext:
      # @config-manager:start linters-settings-fatcontext
      # Check for potential fat contexts in struct pointers.
      # May generate false positives.
      # Default: false
      check-struct-pointers: false
      # @config-manager:end linters-settings-fatcontext

    funcorder:
      # @config-manager:start linters-settings-funcorder
      # Checks that constructors are placed after the structure declaration.
      # Default: true
      constructor: true

      # Checks if the exported methods of a structure are placed before the non-exported ones.
      # Default: true
      struct-method: true

      # Checks if the constructors and/or structure methods are sorted alphabetically.
      # Default: false
      alphabetical: false
      # @config-manager:end linters-settings-funcorder

    funlen:
      # @config-manager:start linters-settings-funlen
      # Checks the number of lines in a function.
      # If lower than 0, disable the check.
      # Default: 60
      lines: -1

      # Checks the number of statements in a function.
      # If lower than 0, disable the check.
      # Default: 40
      statements: -1

      # Ignore comments when counting lines.
      # Default: true
      ignore-comments: true
      # @config-manager:end linters-settings-funlen

    gochecksumtype:
      # @config-manager:start linters-settings-gochecksumtype
      # Presence of `default` case in switch statements satisfies
      # exhaustiveness, if all members are not listed.
      # Default: true
      default-signifies-exhaustive: true

      # Include shared interfaces in the exhaustiveness check.
      # Default: false
      include-shared-interfaces: false
      # @config-manager:end linters-settings-gochecksumtype

    gocognit:
      # @config-manager:start linters-settings-gocognit
      # Minimal code complexity to report.
      # Default: 30 (but we recommend 10-20)
      min-complexity: 20
      # @config-manager:end linters-settings-gocognit

    goconst:
      # @config-manager:start linters-settings-goconst
      # Minimal length of string constant.
      # Default: 3
      min-len: 80

      # Minimum occurrences of constant string count to trigger issue.
      # Default: 3
      min-occurrences: 3

      # Look for existing constants matching the values.
      # Default: true
      match-constant: true

      # Search also for duplicated numbers.
      # Default: false
      numbers: false

      # Minimum value, only works with `goconst.numbers`.
      # Default: 3
      # min: 2

      # Maximum value, only works with `goconst.numbers`.
      # Default: 3
      # max: 2

      # Ignore when constant is not used as function argument.
      # Default: true
      ignore-calls: true

      # Exclude strings matching the given regular expression.
      # Default: ""
      ignore-string-values:
        - "foo.+"

      # Detects constants with identical values.
      # Default: false
      find-duplicates: false

      # Evaluates of constant expressions like Prefix + "suffix".
      # Default: false
      eval-const-expressions: true
      # @config-manager:end linters-settings-goconst

    gocritic:
      # @config-manager:start linters-settings-gocritic
      # Disable all checks.
      # Default: false
      disable-all: false

      # Which checks should be enabled in addition to default checks; can't be combined with 'disabled-checks'.
      # By default, list of stable checks is used (https://go-critic.com/overview#checks-overview):
      #   appendAssign, argOrder, assignOp, badCall, badCond, captLocal, caseOrder, codegenComment, commentFormatting,
      #   defaultCaseOrder, deprecatedComment, dupArg, dupBranchBody, dupCase, dupSubExpr, elseif, exitAfterDefer,
      #   flagDeref, flagName, ifElseChain, mapKey, newDeref, offBy1, regexpMust, singleCaseSwitch, sloppyLen,
      #   sloppyTypeAssert, switchTrue, typeSwitchVar, underef, unlambda, unslice, valSwap, wrapperFunc
      # To see which checks are enabled run `GL_DEBUG=gocritic golangci-lint run --enable=gocritic`.
      # enabled-checks:

      # Enable all checks.
      # Default: false
      enable-all: true

      # Which checks should be disabled; can't be combined with 'enabled-checks'.
      # Default: []
      disabled-checks:
        - unnamedResult

      # Enable multiple checks by tags in addition to default checks.
      # Run `GL_DEBUG=gocritic golangci-lint run --enable=gocritic` to see all tags and checks.
      # See https://github.com/go-critic/go-critic#usage -> section "Tags".
      # Default: []
      # enabled-tags:
      #   - diagnostic
      #   - experimental
      #   - opinionated
      #   - performance
      #   - style

      # Settings passed to gocritic.
      # The settings key is the name of a supported gocritic checker.
      # The list of supported checkers can be found at https://go-critic.com/overview.
      settings:
        # Must be valid enabled check name.
        captLocal:
          # Whether to restrict checker to params only.
          # Default: true
          paramsOnly: true

        commentedOutCode:
          # Min length of the comment that triggers a warning.
          # Default: 15
          minLength: 50

        elseif:
          # Whether to skip balanced if-else pairs.
          # Default: true
          skipBalanced: true

        hugeParam:
          # Size in bytes that makes the warning trigger.
          # Default: 80
          sizeThreshold: 80

        ifElseChain:
          # Min number of if-else blocks that makes the warning trigger.
          # Default: 2
          minThreshold: 10

        nestingReduce:
          # Min number of statements inside a branch to trigger a warning.
          # Default: 5
          bodyWidth: 5

        rangeExprCopy:
          # Size in bytes that makes the warning trigger.
          # Default: 512
          sizeThreshold: 512
          # Whether to check test functions
          # Default: true
          skipTestFuncs: true

        rangeValCopy:
          # Size in bytes that makes the warning trigger.
          # Default: 128
          sizeThreshold: 128
          # Whether to check test functions.
          # Default: true
          skipTestFuncs: true

        # ruleguard:
        # Enable debug to identify which 'Where' condition was rejected.
        # The value of the parameter is the name of a function in a ruleguard file.
        #
        # When a rule is evaluated:
        # If:
        #   The Match() clause is accepted; and
        #   One of the conditions in the Where() clause is rejected,
        # Then:
        #   ruleguard prints the specific Where() condition that was rejected.
        #
        # The option is passed to the ruleguard 'debug-group' argument.
        # Default: ""
        # debug: ""

        # Determines the behavior when an error occurs while parsing ruleguard files.
        # If flag is not set, log error and skip rule files that contain an error.
        # If flag is set, the value must be a comma-separated list of error conditions.
        # - 'all':    fail on all errors.
        # - 'import': ruleguard rule imports a package that cannot be found.
        # - 'dsl':    gorule file does not comply with the ruleguard DSL.
        # Default: ""
        # failOn: dsl,import

        # Comma-separated list of file paths containing ruleguard rules.
        # By default, if a path is relative, it is relative to the directory where the golangci-lint command is executed.
        # The placeholder '${base-path}' is substituted with a path relative to the mode defined with `run.relative-path-mode`.
        # The placeholder '${config-path}' is substituted with a path relative to the configuration file.
        # Glob patterns such as 'rules-*.go' may be specified.
        # Default: ""
        # rules: "${base-path}/ruleguard/rules-*.go,${base-path}/myrule1.go"

        # Comma-separated list of enabled groups or skip empty to enable everything.
        # Tags can be defined with # character prefix.
        # Default: "<all>"
        # enable: "myGroupName,#myTagName"

        # Comma-separated list of disabled groups or skip empty to enable everything.
        # Tags can be defined with # character prefix.
        # Default: ""
        # disable: "myGroupName,#myTagName"

        tooManyResultsChecker:
          # Maximum number of results.
          # Default: 5
          maxResults: 100

        truncateCmp:
          # Whether to skip int/uint/uintptr types.
          # Default: true
          skipArchDependent: true

        underef:
          # Whether to skip (*x).method() calls where x is a pointer receiver.
          # Default: true
          skipRecvDeref: true

        # unnamedResult:
        #   # Whether to check exported functions.
        #   # Default: false
        #   checkExported: false
      # @config-manager:end linters-settings-gocritic

    gocyclo:
      # Minimal code complexity to report.
      # Default: 30 (but we recommend 10-20)
      min-complexity: 21

    godoclint:
      # Default set of rules to enable.
      # Possible values are: `basic`, `all` or `none`.
      # Default: `basic` (enables `pkg-doc`, `single-pkg-doc`, `start-with-name`, and `deprecated`)
      default: none

      # List of rules to enable in addition to the default set.
      # Default: empty
      enable:
        # Check proper package-level godoc, if any.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#pkg-doc
        - pkg-doc

        # Assert at most one godoc per package.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#single-pkg-doc
        - single-pkg-doc

        # Require all packages to have a godoc.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#require-pkg-doc
        - require-pkg-doc

        # Assert symbol godocs start with the symbol name.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#start-with-name
        - start-with-name

        # Require godoc for all public symbols.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#require-doc
        - require-doc

        # Assert correct formatting of deprecation notes.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#deprecated
        - deprecated

        # Assert maximum line length for godocs.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#max-len
        - max-len

        # Assert no unused link in godocs.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#no-unused-link
        - no-unused-link

        # Require proper doc links to standard library declarations where applicable.
        # https://github.com/godoc-lint/godoc-lint?tab=readme-ov-file#require-stdlib-doclink
        - require-stdlib-doclink

      # List of rules to disable.
      # Default: empty
      disable: []

      # A map for fine-tuning individual rules.
      # All subkeys are optional.
      options:
        max-len:
          # Maximum line length for godocs, not including the `//`, `/*` or `*/` tokens.
          # Default: 77
          length: 77

        require-doc:
          # Ignore exported (public) symbols when applying the `require-doc` rule.
          # Default: false
          ignore-exported: false

          # Ignore unexported (private) symbols when applying the `require-doc` rule.
          # Default: true
          ignore-unexported: true

        start-with-name:
          # Include unexported symbols when applying the `start-with-name` rule.
          # Default: false
          include-unexported: false

    godot:
      # @config-manager:start linters-settings-godot
      # Comments to be checked: `declarations`, `toplevel`, `noinline` or `all`.
      scope: all

      # List of regexps for excluding particular comment lines from check.
      # Default: []
      exclude: []
      # Exclude todo and fixme comments.
      # - "^fixme:"
      # - "^todo:"

      # Check that each sentence ends with a period.
      # Default: true
      period: true

      # Check that each sentence starts with a capital letter.
      # Default: false
      capital: false
      # @config-manager:end linters-settings-godot

    godox:
      # @config-manager:start linters-settings-godox
      # Report any comments starting with keywords, this is useful for TODO or FIXME comments that
      # might be left in the code accidentally and should be resolved before merging.
      # Default: ["TODO", "BUG", "FIXME"]
      keywords:
        - BUG
        - FIXME
        - HACK
        - NOTE
        - OPTIMIZE
        - TODO
        - "@TODO"
        # @config-manager:end linters-settings-godox

    goheader:
      # @config-manager:start linters-settings-goheader
      values:
        const:
          COMPANY: Northwood Labs, LLC
          EMAIL: license@northwood-labs.com
      template: |-
        Copyright {{ YEAR-RANGE }}, {{ COMPANY }} <{{ EMAIL }}>

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

            https://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.
      # @config-manager:end linters-settings-goheader

    gomoddirectives:
      # @config-manager:start linters-settings-gomoddirectives
      # Allow local `replace` directives.
      # Default: false
      replace-local: false

      # List of allowed `replace` directives.
      # Default: []
      # replace-allow-list:
      #   - launchpad.net/gocheck

      # Allow to not explain why the version has been retracted in the `retract` directives.
      # Default: false
      retract-allow-no-explanation: true

      # Forbid the use of the `exclude` directives.
      # Default: false
      exclude-forbidden: false

      # Forbid the use of the `ignore` directives (>= go1.25).
      # Default: false
      ignore-forbidden: false

      # Forbid the use of the `toolchain` directive.
      # Default: false
      toolchain-forbidden: false

      # Defines a pattern to validate `toolchain` directive.
      # Default: '' (no match)
      # toolchain-pattern: 'go1\.23\.\d+$'

      # Forbid the use of the `tool` directives.
      # Default: false
      tool-forbidden: false

      # Forbid the use of the `godebug` directive.
      # Default: false
      go-debug-forbidden: false
      # Defines a pattern to validate `go` minimum version directive.
      # Default: '' (no match)
      # go-version-pattern: '\d\.\d+(\.0)?'
      # @config-manager:end linters-settings-gomoddirectives

    gosec:
      # @config-manager:start linters-settings-gosec
      # To select a subset of rules to run.
      # Available rules: https://github.com/securego/gosec#available-rules
      # Default: [] - means include all rules
      # includes:
      #   - G101 # Look for hard coded credentials
      #   - G102 # Bind to all interfaces
      #   - G103 # Audit the use of unsafe block
      #   - G104 # Audit errors not checked
      #   - G106 # Audit the use of ssh.InsecureIgnoreHostKey
      #   - G107 # Url provided to HTTP request as taint input
      #   - G108 # Profiling endpoint automatically exposed on /debug/pprof
      #   - G109 # Potential Integer overflow made by strconv.Atoi result conversion to int16/32
      #   - G110 # Potential DoS vulnerability via decompression bomb
      #   - G111 # Potential directory traversal
      #   - G112 # Potential slowloris attack
      #   - G114 # Use of net/http serve function that has no support for setting timeouts
      #   - G115 # Potential integer overflow when converting between integer types
      #   - G201 # SQL query construction using format string
      #   - G202 # SQL query construction using string concatenation
      #   - G203 # Use of unescaped data in HTML templates
      #   - G204 # Audit use of command execution
      #   - G301 # Poor file permissions used when creating a directory
      #   - G302 # Poor file permissions used with chmod
      #   - G303 # Creating tempfile using a predictable path
      #   - G304 # File path provided as taint input
      #   - G305 # File traversal when extracting zip/tar archive
      #   - G306 # Poor file permissions used when writing to a new file
      #   - G307 # Poor file permissions used when creating a file with os.Create
      #   - G401 # Detect the usage of MD5 or SHA1
      #   - G402 # Look for bad TLS connection settings
      #   - G403 # Ensure minimum RSA key length of 2048 bits
      #   - G404 # Insecure random number source (rand)
      #   - G405 # Detect the usage of DES or RC4
      #   - G406 # Detect the usage of MD4 or RIPEMD160
      #   - G501 # Import blocklist: crypto/md5
      #   - G502 # Import blocklist: crypto/des
      #   - G503 # Import blocklist: crypto/rc4
      #   - G504 # Import blocklist: net/http/cgi
      #   - G505 # Import blocklist: crypto/sha1
      #   - G506 # Import blocklist: golang.org/x/crypto/md4
      #   - G507 # Import blocklist: golang.org/x/crypto/ripemd160
      #   - G601 # Implicit memory aliasing of items from a range statement
      #   - G602 # Slice access out of bounds

      # To specify a set of rules to explicitly exclude.
      # Available rules: https://github.com/securego/gosec#available-rules
      # Default: []
      # excludes:
      #   - G101 # Look for hard coded credentials
      #   - G102 # Bind to all interfaces
      #   - G103 # Audit the use of unsafe block
      #   - G104 # Audit errors not checked
      #   - G106 # Audit the use of ssh.InsecureIgnoreHostKey
      #   - G107 # Url provided to HTTP request as taint input
      #   - G108 # Profiling endpoint automatically exposed on /debug/pprof
      #   - G109 # Potential Integer overflow made by strconv.Atoi result conversion to int16/32
      #   - G110 # Potential DoS vulnerability via decompression bomb
      #   - G111 # Potential directory traversal
      #   - G112 # Potential slowloris attack
      #   - G114 # Use of net/http serve function that has no support for setting timeouts
      #   - G115 # Potential integer overflow when converting between integer types
      #   - G201 # SQL query construction using format string
      #   - G202 # SQL query construction using string concatenation
      #   - G203 # Use of unescaped data in HTML templates
      #   - G204 # Audit use of command execution
      #   - G301 # Poor file permissions used when creating a directory
      #   - G302 # Poor file permissions used with chmod
      #   - G303 # Creating tempfile using a predictable path
      #   - G304 # File path provided as taint input
      #   - G305 # File traversal when extracting zip/tar archive
      #   - G306 # Poor file permissions used when writing to a new file
      #   - G307 # Poor file permissions used when creating a file with os.Create
      #   - G401 # Detect the usage of MD5 or SHA1
      #   - G402 # Look for bad TLS connection settings
      #   - G403 # Ensure minimum RSA key length of 2048 bits
      #   - G404 # Insecure random number source (rand)
      #   - G405 # Detect the usage of DES or RC4
      #   - G406 # Detect the usage of MD4 or RIPEMD160
      #   - G501 # Import blocklist: crypto/md5
      #   - G502 # Import blocklist: crypto/des
      #   - G503 # Import blocklist: crypto/rc4
      #   - G504 # Import blocklist: net/http/cgi
      #   - G505 # Import blocklist: crypto/sha1
      #   - G506 # Import blocklist: golang.org/x/crypto/md4
      #   - G507 # Import blocklist: golang.org/x/crypto/ripemd160
      #   - G601 # Implicit memory aliasing of items from a range statement
      #   - G602 # Slice access out of bounds

      # Filter out the issues with a lower severity than the given value.
      # Valid options are: low, medium, high.
      # Default: low
      severity: low

      # Filter out the issues with a lower confidence than the given value.
      # Valid options are: low, medium, high.
      # Default: low
      confidence: medium

      # Concurrency value.
      # Default: the number of logical CPUs usable by the current process.
      # concurrency: 12

      # To specify the configuration of rules.
      config:
        # Globals are applicable to all rules.
        global:
          # If true, ignore #nosec in comments (and an alternative as well).
          # Default: false
          nosec: false

          # Add an alternative comment prefix to #nosec (both will work at the same time).
          # Default: ""
          # "#nosec": "#my-custom-nosec"

          # Define whether nosec issues are counted as finding or not.
          # Default: false
          show-ignored: false

          # Audit mode enables addition checks that for normal code analysis might be too nosy.
          # Default: false
          audit: true
        G101:
          # Regexp pattern for variables and constants to find.
          # Default: "(?i)passwd|pass|password|pwd|secret|token|pw|apiKey|bearer|cred"
          pattern: "(?i)example"

          # If true, complain about all cases (even with low entropy).
          # Default: false
          ignore_entropy: false

          # Maximum allowed entropy of the string.
          # Default: "80.0"
          entropy_threshold: "80.0"

          # Maximum allowed value of entropy/string length.
          # Is taken into account if entropy >= entropy_threshold/2.
          # Default: "3.0"
          per_char_threshold: "3.0"

          # Calculate entropy for first N chars of the string.
          # Default: "16"
          truncate: "16"

        # Additional functions to ignore while checking unhandled errors.
        # Following functions always ignored:
        #   bytes.Buffer:
        #     - Write
        #     - WriteByte
        #     - WriteRune
        #     - WriteString
        #   fmt:
        #     - Print
        #     - Printf
        #     - Println
        #     - Fprint
        #     - Fprintf
        #     - Fprintln
        #   strings.Builder:
        #     - Write
        #     - WriteByte
        #     - WriteRune
        #     - WriteString
        #   io.PipeWriter:
        #     - CloseWithError
        #   hash.Hash:
        #     - Write
        #   os:
        #     - Unsetenv
        # Default: {}
        G104:
          fmt:
            - Fscanf
          os.File:
            - Close

        G111:
          # Regexp pattern to find potential directory traversal.
          # Default: "http\\.Dir\\(\"\\/\"\\)|http\\.Dir\\('\\/'\\)"
          pattern: "custom\\.Dir\\(\\)"

        # Maximum allowed permissions mode for os.Mkdir and os.MkdirAll.
        # Default: "0750"
        G301: "0755"

        # Maximum allowed permissions mode for os.OpenFile and os.Chmod.
        # Default: "0600"
        G302: "0644"

        # Maximum allowed permissions mode for os.WriteFile and ioutil.WriteFile.
        # Default: "0600"
        G306: "0666"
        # @config-manager:end linters-settings-gosec

    govet:
      # @config-manager:start linters-settings-govet
      # Disable all analyzers.
      # Default: false
      # disable-all: true
      # Enable analyzers by name.
      # (In addition to default:
      #   appends, asmdecl, assign, atomic, bools, buildtag, cgocall, composites, copylocks, defers, directive, errorsas,
      #   framepointer, httpresponse, ifaceassert, loopclosure, lostcancel, nilfunc, printf, shift, sigchanyzer, slog,
      #   stdmethods, stringintconv, structtag, testinggoroutine, tests, timeformat, unmarshal, unreachable, unsafeptr,
      #   unusedresult
      # ).
      # Run `GL_DEBUG=govet golangci-lint run --enable=govet` to see default, all available analyzers, and enabled analyzers.
      # Default: []
      # enable:
      #   - appends # Check for missing values after append.
      #   - asmdecl # Report mismatches between assembly files and Go declarations.
      #   - assign # Check for useless assignments.
      #   - atomic # Check for common mistakes using the sync/atomic package.
      #   - atomicalign # Check for non-64-bits-aligned arguments to sync/atomic functions.
      #   - bools # Check for common mistakes involving boolean operators.
      #   - buildtag # Check //go:build and // +build directives.
      #   - cgocall # Detect some violations of the cgo pointer passing rules.
      #   - composites # Check for unkeyed composite literals.
      #   - copylocks # Check for locks erroneously passed by value.
      #   - deepequalerrors # Check for calls of reflect.DeepEqual on error values.
      #   - defers # Report common mistakes in defer statements.
      #   - directive # Check Go toolchain directives such as //go:debug.
      #   - errorsas # Report passing non-pointer or non-error values to errors.As.
      #   - fieldalignment # Find structs that would use less memory if their fields were sorted.
      #   - findcall # Find calls to a particular function.
      #   - framepointer # Report assembly that clobbers the frame pointer before saving it.
      #   - hostport # Check format of addresses passed to net.Dial.
      #   - httpmux # Report using Go 1.22 enhanced ServeMux patterns in older Go versions.
      #   - httpresponse # Check for mistakes using HTTP responses.
      #   - ifaceassert # Detect impossible interface-to-interface type assertions.
      #   - loopclosure # Check references to loop variables from within nested functions.
      #   - lostcancel # Check cancel func returned by context.WithCancel is called.
      #   - nilfunc # Check for useless comparisons between functions and nil.
      #   - nilness # Check for redundant or impossible nil comparisons.
      #   - printf # Check consistency of Printf format strings and arguments.
      #   - reflectvaluecompare # Check for comparing reflect.Value values with == or reflect.DeepEqual.
      #   - shadow # Check for possible unintended shadowing of variables.
      #   - shift # Check for shifts that equal or exceed the width of the integer.
      #   - sigchanyzer # Check for unbuffered channel of os.Signal.
      #   - slog # Check for invalid structured logging calls.
      #   - sortslice # Check the argument type of sort.Slice.
      #   - stdmethods # Check signature of methods of well-known interfaces.
      #   - stdversion # Report uses of too-new standard library symbols.
      #   - stringintconv # Check for string(int) conversions.
      #   - structtag # Check that struct field tags conform to reflect.StructTag.Get.
      #   - testinggoroutine # Report calls to (*testing.T).Fatal from goroutines started by a test.
      #   - tests # Check for common mistaken usages of tests and examples.
      #   - timeformat # Check for calls of (time.Time).Format or time.Parse with 2006-02-01.
      #   - unmarshal # Report passing non-pointer or non-interface values to unmarshal.
      #   - unreachable # Check for unreachable code.
      #   - unsafeptr # Check for invalid conversions of uintptr to unsafe.Pointer.
      #   - unusedresult # Check for unused results of calls to some functions.
      #   - unusedwrite # Checks for unused writes.
      #   - waitgroup # Check for misuses of sync.WaitGroup.

      # Enable all analyzers.
      # Default: false
      enable-all: true
      # disable: []

      # Settings per analyzer.
      settings:
        # Analyzer name, run `go tool vet help` to see all analyzers.
        printf:
          # Comma-separated list of print function names to check (in addition to default, see `go tool vet help printf`).
          # Default: []
          funcs:
          # - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Infof
          # - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Warnf
          # - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Errorf
          # - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Fatalf

        shadow:
          # Whether to be strict about shadowing; can be noisy.
          # Default: false
          strict: false
          # unusedresult:
          # Comma-separated list of functions whose results must be used.
          # (In addition to default:
          #   context.WithCancel, context.WithDeadline, context.WithTimeout, context.WithValue, errors.New, fmt.Errorf,
          #   fmt.Sprint, fmt.Sprintf, sort.Reverse
          # ).
          # Default: []
          # funcs:
          #   - pkg.MyFunc

          # Comma-separated list of names of methods of type func() string whose results must be used.
          # (In addition to default Error,String).
          # Default: []
          # stringmethods:
          #   - MyMethod
      # @config-manager:end linters-settings-govet

    grouper:
      # @config-manager:start linters-settings-grouper
      # Require the use of a single global 'const' declaration only.
      # Default: false
      const-require-single-const: true

      # Require the use of grouped global 'const' declarations.
      # Default: false
      const-require-grouping: false

      # Require the use of a single 'import' declaration only.
      # Default: false
      import-require-single-import: true

      # Require the use of grouped 'import' declarations.
      # Default: false
      import-require-grouping: false

      # Require the use of a single global 'type' declaration only.
      # Default: false
      type-require-single-type: true

      # Require the use of grouped global 'type' declarations.
      # Default: false
      type-require-grouping: false

      # Require the use of a single global 'var' declaration only.
      # Default: false
      var-require-single-var: true

      # Require the use of grouped global 'var' declarations.
      # Default: false
      var-require-grouping: false
      # @config-manager:end linters-settings-grouper

    iface:
      # @config-manager:start linters-settings-iface
      # List of analyzers.
      # Default: ["identical"]
      enable:
        - identical # Identifies interfaces in the same package that have identical method sets.
        - unused # Identifies interfaces that are not used anywhere in the same package where the interface is defined.
        - opaque # Identifies functions that return interfaces, but the actual returned value is always a single concrete implementation.
        - unexported # Identifies interfaces that are not exported but are used in exported functions or methods.
      settings: {}
      # unused:
      #   # List of packages path to exclude from the check.
      #   # Default: []
      #   exclude:
      #     - github.com/example/log
      # @config-manager:end linters-settings-iface

    importas:
      # @config-manager:start linters-settings-importas
      # Do not allow unaliased imports of aliased packages.
      # Default: false
      no-unaliased: true

      # Do not allow non-required aliases.
      # Default: false
      no-extra-aliases: false
      # # List of aliases
      # # Default: []
      # alias:
      #   # Using `servingv1` alias for `knative.dev/serving/pkg/apis/serving/v1` package.
      #   - pkg: knative.dev/serving/pkg/apis/serving/v1
      #     alias: servingv1

      #   # Using `autoscalingv1alpha1` alias for `knative.dev/serving/pkg/apis/autoscaling/v1alpha1` package.
      #   - pkg: knative.dev/serving/pkg/apis/autoscaling/v1alpha1
      #     alias: autoscalingv1alpha1

      #   # You can specify the package path by regular expression,
      #   # and alias by regular expression expansion syntax like below.
      #   # See https://github.com/julz/importas#use-regular-expression for details.
      #   - pkg: knative.dev/serving/pkg/apis/(\w+)/(v[\w\d]+)
      #     alias: $1$2

      #   # An explicit empty alias can be used to ensure no aliases are used for a package.
      #   # This can be useful if `no-extra-aliases: true` doesn't fit your need.
      #   # Multiple packages can use an empty alias.
      #   - pkg: errors
      #     alias: ""
      # @config-manager:end linters-settings-importas

    inamedparam:
      # @config-manager:start linters-settings-inamedparam
      # Skips check for interface methods with only a single parameter.
      # Default: false
      skip-single-param: false
      # @config-manager:end linters-settings-inamedparam

    ineffassign:
      # @config-manager:start linters-settings-ineffassign
      # Check escaping variables of type error, may cause false positives.
      # Default: false
      check-escaping-errors: true
      # @config-manager:end linters-settings-ineffassign

    interfacebloat:
      # @config-manager:start linters-settings-interfacebloat
      # The maximum number of methods allowed for an interface.
      # Default: 10
      max: 10
      # @config-manager:end linters-settings-interfacebloat

    iotamixing:
      # @config-manager:start linters-settings-iotamixing
      # Whether to report individual consts rather than just the const block.
      # Default: false
      report-individual: true
      # @config-manager:end linters-settings-iotamixing

    lll:
      # @config-manager:start linters-settings-lll
      # Max line length, lines longer will be reported.
      # '\t' is counted as 1 character by default, and can be changed with the tab-width option.
      # Default: 120.
      line-length: 120

      # Tab width in spaces.
      # Default: 1
      tab-width: 1
      # @config-manager:end linters-settings-lll

    maintidx:
      # @config-manager:start linters-settings-maintidx
      # Show functions with maintainability index lower than N.
      # A high index indicates better maintainability (it's kind of the opposite of complexity).
      # Default: 20
      under: 20
      # @config-manager:end linters-settings-maintidx

    makezero:
      # @config-manager:start linters-settings-makezero
      # Allow only slices initialized with a length of zero.
      # Default: false
      always: false
      # @config-manager:end linters-settings-makezero

    misspell:
      # @config-manager:start linters-settings-misspell
      # Correct spellings using locale preferences for US or UK.
      # Setting locale to US will correct the British spelling of 'colour' to 'color'.
      # Default is to use a neutral variety of English.
      locale: US

      # Typos to ignore.
      # Should be in lower case.
      # Default: []
      # ignore-rules:
      #   - someword

      # Extra word corrections.
      # `typo` and `correction` should only contain letters.
      # The words are case-insensitive.
      # Default: []
      extra-words:
        - typo: "iff"
          correction: "if"
        - typo: "cancelation"
          correction: "cancellation"
          # Mode of the analysis:
          # - default: checks all the file content.
          # - restricted: checks only comments.
          # Default: ""
          # mode: restricted
      # @config-manager:end linters-settings-misspell

    mnd:
      # @config-manager:start linters-settings-mnd
      # List of enabled checks, see https://github.com/tommy-muehle/go-mnd/#checks for description.
      # Default: ["argument", "case", "condition", "operation", "return", "assign"]
      checks:
        - argument
        - case
        - condition
        - operation
        - return
        - assign

      # List of numbers to exclude from analysis.
      # The numbers should be written as string.
      # Values always ignored: "1", "1.0", "0" and "0.0".
      # Default: []
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "0544"
        - "0600"
        - "0644"
        - "0666"
        - "0755"
