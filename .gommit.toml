[config]
  # @config-manager:start config
  exclude-merge-commits = true
  check-summary-length  = true
  summary-length        = 80
  # @config-manager:end config

[matchers]
  # @config-manager:start matchers
  all = "(?:build|chore|ci|deps|docs|feat|fix|lint|perf|refactor|relprep|style|test)(?:\\([^\\)]*\\))?: (?:(.|\n)+)"
  # @config-manager:end matchers

[examples]
  # @config-manager:start examples
  a_simple_commit = """
[build|chore|ci|deps|docs|feat|fix|lint|perf|refactor|relprep|style|test](module): A commit message
"""
  an_extended_commit = """
[build|chore|ci|deps|docs|feat|fix|lint|perf|refactor|relprep|style|test](module): A commit message

* first line
* second line
* and so on...
"""
  # @config-manager:end examples
