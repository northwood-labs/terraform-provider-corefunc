---
# @config-manager:start extras
dependency-tree: true
exit-code: 1
format: table
ignore-policy: ""
ignorefile: .trivyignore
include-dev-deps: false
insecure: false
list-all-pkgs: true
output: ""
quiet: true
report: summary
timeout: 5m0s
# @config-manager:end extras

cache:
  # @config-manager:start cache
  backend: fs
  # @config-manager:end cache

db:
  # @config-manager:start db
  download-java-only: false
  download-only: false
  java-skip-update: false
  light: false
  no-progress: false
  skip-update: false
  # @config-manager:end db

misconfiguration:
  # @config-manager:start misconfiguration
  include-non-failures: false
  # @config-manager:end misconfiguration

scan:
  # @config-manager:start scan
  compliance: ""
  file-patterns: []
  offline: false
  scanners:
    - vuln
    - config
    - secret
  skip-dirs: []
  skip-files: []
  slow: false
  # @config-manager:end scan

secret:
  # @config-manager:start secret
  # https://trivy.dev/docs/latest/scanner/secret/
  config: trivy-secret.yaml
  # @config-manager:end secret

severity:
  # @config-manager:start severity
  - UNKNOWN
  - LOW
  - MEDIUM
  - HIGH
  - CRITICAL
  # @config-manager:end severity

vulnerability:
  # @config-manager:start vulnerability
  ignore-status: []
  ignore-unfixed: true
  type:
    - os
    - library
  # @config-manager:end vulnerability
